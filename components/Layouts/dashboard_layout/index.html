<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Layout with Header and Sidebar</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="h-screen flex flex-col">
    <!-- Header Section -->
    <header class="bg-blue-600 text-white p-4 shadow-lg">
        <div class="container mx-auto">
            <h1 class="text-2xl font-bold">Header Section</h1>
        </div>
    </header>

    <!-- Main Container with Sidebar and Content -->
    <div class="flex flex-1 overflow-hidden">
        <!-- Sidebar -->
        <aside id="sidebar" class="bg-gray-800 text-white overflow-y-auto transition-all duration-300 w-64 flex flex-col">
            <div class="p-6 flex-1">
                <h2 id="sidebarTitle" class="text-xl font-semibold mb-4">Sidebar</h2>
                <nav>
                    <ul class="space-y-2">
                        <li>
                            <a href="#" class="flex items-center p-2 hover:bg-gray-700 rounded">
                                <svg class="w-5 h-5 mr-3 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path>
                                </svg>
                                <span class="menu-text">Dashboard</span>
                            </a>
                        </li>
                        <li>
                            <a href="#" class="flex items-center p-2 hover:bg-gray-700 rounded">
                                <svg class="w-5 h-5 mr-3 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                                </svg>
                                <span class="menu-text">Users</span>
                            </a>
                        </li>
                        <li>
                            <a href="#" class="flex items-center p-2 hover:bg-gray-700 rounded">
                                <svg class="w-5 h-5 mr-3 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path>
                                </svg>
                                <span class="menu-text">Analytics</span>
                            </a>
                        </li>
                        <li>
                            <a href="#" class="flex items-center p-2 hover:bg-gray-700 rounded">
                                <svg class="w-5 h-5 mr-3 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path>
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                                </svg>
                                <span class="menu-text">Settings</span>
                            </a>
                        </li>
                    </ul>
                </nav>
            </div>
            
            <!-- Toggle Button at Bottom -->
            <div class="border-t border-gray-700">
                <button id="toggleSidebar" class="w-full p-4 hover:bg-gray-700 transition-colors flex items-center justify-center">
                    <svg id="arrowIcon" class="w-6 h-6 transition-transform duration-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 19l-7-7 7-7m8 14l-7-7 7-7"></path>
                    </svg>
                </button>
            </div>
        </aside>

        <!-- Main Section -->
        <main class="flex-1 bg-gray-100 p-8 overflow-y-auto">
            <h2 class="text-3xl font-bold mb-4">Main Section Here</h2>
            <p class="text-gray-700 mb-4">This is the main content area. Add your content here.</p>
            <div class="bg-white p-6 rounded-lg shadow">
                <h3 class="text-xl font-semibold mb-2">Content Card</h3>
                <p class="text-gray-600">Your main content goes in this section.</p>
            </div>
        </main>
    </div>

    <script>
        const sidebar = document.getElementById('sidebar');
        const toggleBtn = document.getElementById('toggleSidebar');
        const arrowIcon = document.getElementById('arrowIcon');
        const menuTexts = document.querySelectorAll('.menu-text');
        const sidebarTitle = document.getElementById('sidebarTitle');
        let isMinimized = false;

        toggleBtn.addEventListener('click', () => {
            isMinimized = !isMinimized;
            
            if (isMinimized) {
                // Minimize sidebar
                sidebar.classList.remove('w-64');
                sidebar.classList.add('w-20');
                sidebarTitle.classList.add('hidden');
                menuTexts.forEach(text => text.classList.add('hidden'));
                // Rotate arrow to point right
                arrowIcon.style.transform = 'rotate(180deg)';
            } else {
                // Maximize sidebar
                sidebar.classList.remove('w-20');
                sidebar.classList.add('w-64');
                sidebarTitle.classList.remove('hidden');
                menuTexts.forEach(text => text.classList.remove('hidden'));
                // Rotate arrow to point left
                arrowIcon.style.transform = 'rotate(0deg)';
            }
        });
    </script>
</body>
</html>
